# This workflow runs on `pull_request`.
#
# `Lint code base` job uses `checkout` to download the content of the repository. It uses GitHub Action
# `super-linter/super-linter` to run a combination of various linters, written in bash, to help validate
# your source code.
#
# Documentation
# - https://github.com/marketplace/actions/super-linter

name: Lint Code Base

on:  # yamllint disable-line rule:truthy
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  build:
    name: Lint code base
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter@v8
        env:
          VALIDATE_ALL_CODEBASE: false
          # Need to define main branch as default
          # is set to master in super-linter
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The following linter types will be enabled:
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_TERRAFORM_TFLINT: true
          VALIDATE_YAML: true
          # Exclude SKILL.md and README.md files from markdown linting
          FILTER_REGEX_EXCLUDE: .*(SKILL|README)\.md$
